name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download JUnit JARs
      run: |
        mkdir -p lib
        curl -L -o lib/junit-jupiter-api.jar https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-api/5.10.0/junit-jupiter-api-5.10.0.jar
        curl -L -o lib/junit-platform-commons.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-commons/1.10.0/junit-platform-commons-1.10.0.jar
        curl -L -o lib/opentest4j.jar https://repo1.maven.org/maven2/org/opentest4j/opentest4j/1.3.0/opentest4j-1.3.0.jar
        curl -L -o lib/junit-standalone.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.0/junit-platform-console-standalone-1.10.0.jar

    - name: Compile All Project Files
      run: |
        mkdir -p out
        find . -name "*.java" -not -path "./randoop-tests/*" -print0 | xargs -0 javac -cp "lib/junit-jupiter-api.jar:lib/junit-platform-commons.jar:lib/opentest4j.jar" -d out

    - name: Run Tests
      run: |
        java -jar lib/junit-standalone.jar \
          -cp "out:lib/junit-jupiter-api.jar:lib/junit-platform-commons.jar:lib/opentest4j.jar" \
          --scan-classpath
