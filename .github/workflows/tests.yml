name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download JUnit JARs
      run: |
        mkdir -p lib
        curl -L -o lib/junit-jupiter-api.jar https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-api/5.10.0/junit-jupiter-api-5.10.0.jar
        curl -L -o lib/junit-platform-commons.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-commons/1.10.0/junit-platform-commons-1.10.0.jar
        curl -L -o lib/opentest4j.jar https://repo1.maven.org/maven2/org/opentest4j/opentest4j/1.3.0/opentest4j-1.3.0.jar
        curl -L -o lib/junit-standalone.jar https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.0/junit-platform-console-standalone-1.10.0.jar
        curl -L -o lib/junit4.jar https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar
        curl -L -o lib/hamcrest.jar https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar

    - name: Compile Bahaa UC03
      run: |
        mkdir -p out
        find ./Bahaa-UC03 -name "*.java" -not -name "RegressionTest*.java" -not -name "ErrorTest*.java" -print0 | xargs -0 javac -cp "lib/junit-jupiter-api.jar:lib/junit-platform-commons.jar:lib/opentest4j.jar" -d out || true

    - name: Compile Fatima UC01
      run: |
        find ./Fatima-UC01 -name "*.java" -not -name "RegressionTest*.java" -not -name "ErrorTest*.java" -print0 | xargs -0 javac -cp "lib/junit-jupiter-api.jar:lib/junit-platform-commons.jar:lib/opentest4j.jar:lib/junit4.jar:lib/hamcrest.jar" -d out || true

    - name: Compile Khalid UC02
      run: |
        find ./Khalid-UC02 -name "*.java" -not -name "RegressionTest*.java" -not -name "ErrorTest*.java" -print0 | xargs -0 javac -cp "lib/junit-jupiter-api.jar:lib/junit-platform-commons.jar:lib/opentest4j.jar:lib/junit4.jar:lib/hamcrest.jar" -d out || true

    - name: Compile Ali UC04
      run: |
        find ./Ali-UC04 -name "*.java" -not -name "RegressionTest*.java" -not -name "ErrorTest*.java" -print0 | xargs -0 javac -cp "lib/junit-jupiter-api.jar:lib/junit-platform-commons.jar:lib/opentest4j.jar:lib/junit4.jar:lib/hamcrest.jar" -d out || true

    - name: Run Tests
      run: |
        java -jar lib/junit-standalone.jar \
          -cp "out:lib/junit-jupiter-api.jar:lib/junit-platform-commons.jar:lib/opentest4j.jar:lib/junit4.jar:lib/hamcrest.jar" \
          --scan-classpath
